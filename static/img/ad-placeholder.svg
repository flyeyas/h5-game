<svg width="300" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="400" fill="#e9ecef" />
  
  <!-- 文字 -->
  <text x="150" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#495057" text-anchor="middle">Advertisement</text>
  
  <!-- 装饰性图标 -->
  <rect x="100" y="130" width="100" height="80" stroke="#6c757d" stroke-width="2" fill="none" stroke-dasharray="5,5" />
  <text x="150" y="240" font-family="Arial, sans-serif" font-size="16" fill="#6c757d" text-anchor="middle">300 x 400</text>
  
  <!-- 边框 -->
  <rect width="300" height="400" fill="none" stroke="#dee2e6" stroke-width="2" />
</svg> 