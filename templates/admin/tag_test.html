<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模态框测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 50px;
        }
        .container {
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>模态框测试</h1>
        
        <p>测试不同的模态框打开方式：</p>
        
        <div class="d-flex gap-3 mb-5">
            <!-- 方式1：使用Bootstrap属性 -->
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#testModal1">
                方式1：使用data-bs-toggle
            </button>
            
            <!-- 方式2：使用jQuery -->
            <button class="btn btn-success" id="btn-jquery-modal">
                方式2：使用jQuery
            </button>
            
            <!-- 方式3：使用Bootstrap JS -->
            <button class="btn btn-info" id="btn-bs-modal">
                方式3：使用Bootstrap JS
            </button>
        </div>
        
        <!-- 测试模态框 -->
        <div class="modal fade" id="testModal1" tabindex="-1" aria-labelledby="modalLabel1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalLabel1">测试模态框1</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p>这是使用data-bs-toggle属性打开的模态框</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入jQuery和Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // 方式2：使用jQuery
            $('#btn-jquery-modal').on('click', function() {
                console.log('jQuery按钮点击');
                $('#testModal1').modal('show');
            });
            
            // 方式3：使用Bootstrap JS
            $('#btn-bs-modal').on('click', function() {
                console.log('Bootstrap按钮点击');
                try {
                    const modal = new bootstrap.Modal(document.getElementById('testModal1'));
                    modal.show();
                } catch (error) {
                    console.error('模态框初始化错误:', error);
                    alert('模态框初始化错误: ' + error.message);
                }
            });
            
            // 监听模态框事件
            $('#testModal1').on('show.bs.modal', function() {
                console.log('模态框打开前...');
            });
            
            $('#testModal1').on('shown.bs.modal', function() {
                console.log('模态框已打开');
            });
        });
    </script>
</body>
</html>
