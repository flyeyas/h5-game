{% load i18n %}

<div class="card-header d-flex justify-content-between align-items-center">
    <span>{{ card_title }}</span>
    {% if add_url %}
        <a href="{{ add_url }}" class="btn btn-primary btn-sm">
            <i class="fas fa-plus me-1"></i> {{ add_text|default:_('添加') }}
        </a>
    {% elif show_add_button %}
        <button id="{{ add_button_id|default:'' }}" class="btn btn-primary btn-sm" {% if modal_target %}data-bs-toggle="modal" data-bs-target="{{ modal_target }}"{% endif %}>
            <i class="fas fa-plus me-1"></i> {{ add_text|default:_('添加') }}
        </button>
    {% endif %}
</div>
