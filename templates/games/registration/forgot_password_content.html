{% load static %}
<style>
    /* 内联样式确保背景覆盖 */
    .sidebar-bg {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        border-radius: 10px 0 0 10px;
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
    }
    /* 覆盖.auth-card样式，移除max-width限制 */
    .auth-card {
        max-width: none !important;
    }
    .step-indicator {
        display: flex;
        justify-content: center;
        margin-bottom: 30px;
        position: relative;
    }
    .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        z-index: 1;
        flex: 1;
        max-width: 120px;
    }
    .step-number {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #e9ecef;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        margin-bottom: 8px;
        position: relative;
        z-index: 2;
    }
    .step.active .step-number {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        color: white;
    }
    .step.completed .step-number {
        background: #28a745;
        color: white;
    }
    .step-text {
        font-size: 14px;
        color: #6c757d;
        text-align: center;
    }
    .step.active .step-text {
        color: #6a11cb;
        font-weight: 600;
    }
    .step.completed .step-text {
        color: #28a745;
        font-weight: 600;
    }
    /* 修改步骤连接线的样式 */
    .step-indicator::before {
        content: "";
        position: absolute;
        top: 20px;
        height: 2px;
        background-color: #e9ecef;
        width: 70%;
        left: 15%;
        z-index: 0;
    }
    
    /* 已完成步骤之间的连接线 */
    .step.completed + .step.completed::before,
    .step.completed + .step.active::before {
        content: "";
        position: absolute;
        top: 20px;
        height: 2px;
        background-color: #28a745;
        width: calc(100% - 40px);
        left: calc(-50% + 20px);
        z-index: 0;
    }
    
    /* 普通步骤之间的连接线 */
    .step + .step::before {
        content: "";
        position: absolute;
        top: 20px;
        height: 2px;
        background-color: #e9ecef;
        width: calc(100% - 40px);
        left: calc(-50% + 20px);
        z-index: 0;
    }
    
    /* 成功图标样式 - 匹配原型图 */
    .success-icon {
        width: 70px;
        height: 70px;
        background-color: #28a745;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 30px;
        position: relative;
        z-index: 2;
        box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        animation: fadeInScale 0.5s ease-out;
    }
    
    .success-icon i {
        color: white;
        font-size: 36px;
    }
    
    @keyframes fadeInScale {
        0% {
            opacity: 0;
            transform: scale(0.5);
        }
        100% {
            opacity: 1;
            transform: scale(1);
        }
    }
    
    .success-message {
        text-align: center;
        animation: fadeIn 0.5s ease-out;
    }
    
    @keyframes fadeIn {
        0% {
            opacity: 0;
        }
        100% {
            opacity: 1;
        }
    }
    
    .verification-code {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
    }
    .verification-code input {
        width: 70%;
    }
    .verification-code button {
        width: 28%;
    }
    .back-to-login {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #6c757d;
        text-decoration: none;
    }
    .back-to-login:hover {
        color: #6a11cb;
    }
    .unsplash-img {
        width: 100%;
        border-radius: 8px;
        margin-top: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .alert {
        display: none;
        padding: 0.75rem 1.25rem;
        margin-bottom: 1rem;
        border: 1px solid transparent;
        border-radius: 0.25rem;
    }
    .alert-danger {
        color: #721c24;
        background-color: #f8d7da;
        border-color: #f5c6cb;
    }
    .alert-success {
        color: #155724;
        background-color: #d4edda;
        border-color: #c3e6cb;
    }
    .invalid-feedback {
        display: none;
        width: 100%;
        margin-top: 0.25rem;
        font-size: 80%;
        color: #dc3545;
    }
    .is-invalid {
        border-color: #dc3545;
    }
</style>

<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="auth-card">
                    <div class="row g-0" style="min-height: 600px;">
                        <!-- 左侧信息栏 -->
                        <div class="col-md-5 position-relative">
                            <div class="sidebar-bg"></div>
                            <div class="position-relative" style="z-index: 1; padding: 40px;">
                                {% include 'games/registration/auth_sidebar.html' %}
                                
                                <!-- 添加Unsplash图片 -->
                                <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80" 
                                     alt="游戏图片" class="unsplash-img">
                            </div>
                        </div>
                        
                        <!-- 右侧表单区域 -->
                        <div class="col-md-7 auth-content">
                            <h4 class="mb-4 text-center">找回密码</h4>
                            
                            <div class="step-indicator">
                                <div class="step active" id="step1">
                                    <div class="step-number">1</div>
                                    <div class="step-text">验证邮箱</div>
                                </div>
                                <div class="step" id="step2">
                                    <div class="step-number">2</div>
                                    <div class="step-text">重置密码</div>
                                </div>
                                <div class="step" id="step3">
                                    <div class="step-number">3</div>
                                    <div class="step-text">完成</div>
                                </div>
                            </div>
                            
                            <!-- 提示信息区域 -->
                            <div class="alert alert-danger mb-3" id="errorAlert"></div>
                            <div class="alert alert-success mb-3" id="successAlert"></div>
                            
                            <!-- 步骤1：验证邮箱 -->
                            <div id="step1Form-container">
                                <form id="step1Form">
                                    <div class="mb-3">
                                        <label for="email" class="form-label">邮箱地址</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                            <input type="email" class="form-control" id="email" name="email" placeholder="请输入您的注册邮箱" required>
                                        </div>
                                        <div class="form-text">我们将向该邮箱发送验证码</div>
                                        <div class="invalid-feedback" id="email-error"></div>
                                    </div>
                                    <div class="mb-4">
                                        <label for="verification-code" class="form-label">验证码</label>
                                        <div class="verification-code">
                                            <input type="text" class="form-control" id="verification-code" name="code" placeholder="请输入验证码">
                                            <button type="button" class="btn btn-secondary" id="get-code-btn">获取验证码</button>
                                        </div>
                                        <div class="invalid-feedback" id="code-error"></div>
                                    </div>
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary btn-auth" id="step1-submit">下一步</button>
                                    </div>
                                </form>
                            </div>
                            
                            <!-- 步骤2：重置密码 -->
                            <div id="step2Form-container" style="display:none;">
                                <form id="step2Form">
                                    <input type="hidden" id="reset-email" name="email">
                                    <input type="hidden" id="reset-token" name="token">
                                    
                                    <div class="mb-3">
                                        <label for="new-password" class="form-label">新密码</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                            <input type="password" class="form-control" id="new-password" name="new_password" placeholder="请输入新密码" required>
                                            <button type="button" class="btn btn-outline-secondary password-toggle" tabindex="-1">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                        <small class="text-muted">密码至少需要8个字符，不能是纯数字。</small>
                                        <div class="invalid-feedback" id="new-password-error"></div>
                                    </div>
                                    
                                    <div class="mb-4">
                                        <label for="confirm-password" class="form-label">确认密码</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                            <input type="password" class="form-control" id="confirm-password" name="confirm_password" placeholder="请再次输入新密码" required>
                                            <button type="button" class="btn btn-outline-secondary password-toggle" tabindex="-1">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                        <div class="invalid-feedback" id="confirm-password-error"></div>
                                    </div>
                                    
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary btn-auth" id="step2-submit">重置密码</button>
                                    </div>
                                </form>
                            </div>
                            
                            <!-- 步骤3：完成 -->
                            <div id="step3-container" style="display:none;">
                                <div class="text-center">
                                    <div class="success-icon">
                                        <i class="fas fa-check"></i>
                                    </div>
                                    <h5 class="mb-3">您的密码已成功重置</h5>
                                    <p class="text-muted mb-4">您现在可以使用新密码登录您的账户。</p>
                                    <div class="d-grid gap-2">
                                        <a href="{% url 'games:login' %}" class="btn btn-primary btn-auth">
                                            登录您的账户
                                        </a>
                                    </div>
                                </div>
                            </div>
                            
                            <a href="{% url 'games:login' %}" class="back-to-login">
                                <i class="fas fa-arrow-left me-1"></i>返回登录页面
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 获取验证码按钮点击事件
    const getCodeBtn = document.getElementById('get-code-btn');
    const emailInput = document.getElementById('email');
    
    // 错误和成功提示
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');
    
    // 步骤和表单
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    
    const step1Form = document.getElementById('step1Form');
    const step2Form = document.getElementById('step2Form');
    const step1Container = document.getElementById('step1Form-container');
    const step2Container = document.getElementById('step2Form-container');
    const step3Container = document.getElementById('step3-container');
    
    // 重置密码的email和token
    const resetEmail = document.getElementById('reset-email');
    const resetToken = document.getElementById('reset-token');
    
    // 发送验证码
    getCodeBtn.addEventListener('click', function() {
        const email = emailInput.value.trim();
        
        // 清除错误提示
        clearErrors();
        
        if (!email) {
            showError('email-error', '请输入您的邮箱地址');
            emailInput.classList.add('is-invalid');
            return;
        }
        
        // 禁用按钮并显示倒计时
        startCountdown(getCodeBtn);
        
        // 发送AJAX请求获取验证码
        const formData = new FormData();
        formData.append('email', email);
        
        fetch('{% url "games:send_password_reset_code" %}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': '{{ csrf_token }}'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showSuccess(data.message);
            } else {
                if (data.errors) {
                    handleErrors(data.errors);
                } else {
                    showError('general', '发送验证码失败，请稍后重试');
                }
            }
        })
        .catch(error => {
            console.error('发送验证码错误:', error);
            showError('general', '网络错误，请稍后重试');
        });
    });
    
    // 验证步骤1并进入步骤2
    step1Form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // 清除错误提示
        clearErrors();
        
        // 获取表单数据
        const email = emailInput.value.trim();
        const code = document.getElementById('verification-code').value.trim();
        
        // 验证表单
        if (!email) {
            showError('email-error', '请输入您的邮箱地址');
            document.getElementById('email').classList.add('is-invalid');
            return;
        }
        
        if (!code) {
            showError('code-error', '请输入验证码');
            document.getElementById('verification-code').classList.add('is-invalid');
            return;
        }
        
        // 禁用提交按钮
        const submitBtn = document.getElementById('step1-submit');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 验证中...';
        
        // 发送AJAX请求验证验证码
        const formData = new FormData();
        formData.append('email', email);
        formData.append('code', code);
        
        fetch('{% url "games:verify_reset_code" %}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': '{{ csrf_token }}'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // 保存token和email
                resetEmail.value = data.email;
                resetToken.value = data.token;
                
                // 切换到步骤2
                goToStep2();
            } else {
                if (data.errors) {
                    handleErrors(data.errors);
                    
                    // 确保错误消息显示
                    if (data.errors.code) {
                        const codeInput = document.getElementById('verification-code');
                        codeInput.classList.add('is-invalid');
                        document.getElementById('code-error').textContent = data.errors.code;
                        document.getElementById('code-error').style.display = 'block';
                    }
                    
                    if (data.errors.general) {
                        errorAlert.textContent = data.errors.general;
                        errorAlert.style.display = 'block';
                    }
                } else {
                    showError('general', '验证失败，请稍后重试');
                }
            }
            
            // 恢复提交按钮
            submitBtn.disabled = false;
            submitBtn.textContent = '下一步';
        })
        .catch(error => {
            console.error('验证验证码错误:', error);
            showError('general', '网络错误，请稍后重试');
            
            // 恢复提交按钮
            submitBtn.disabled = false;
            submitBtn.textContent = '下一步';
        });
    });
    
    // 提交新密码
    step2Form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // 清除错误提示
        clearErrors();
        
        // 获取表单数据
        const email = resetEmail.value;
        const token = resetToken.value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        // 基本验证
        if (!newPassword) {
            showError('new-password-error', '请输入新密码');
            document.getElementById('new-password').classList.add('is-invalid');
            return;
        }
        
        if (!confirmPassword) {
            showError('confirm-password-error', '请确认新密码');
            document.getElementById('confirm-password').classList.add('is-invalid');
            return;
        }
        
        if (newPassword !== confirmPassword) {
            showError('confirm-password-error', '两次输入的密码不匹配');
            document.getElementById('confirm-password').classList.add('is-invalid');
            return;
        }
        
        // 禁用提交按钮
        const submitBtn = document.getElementById('step2-submit');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 处理中...';
        
        // 发送AJAX请求重置密码
        const formData = new FormData();
        formData.append('email', email);
        formData.append('token', token);
        formData.append('new_password', newPassword);
        formData.append('confirm_password', confirmPassword);
        
        fetch('{% url "games:reset_password" %}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': '{{ csrf_token }}'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // 切换到步骤3
                goToStep3();
            } else {
                if (data.errors) {
                    handleErrors(data.errors);
                } else {
                    showError('general', '重置密码失败，请稍后重试');
                }
            }
            
            // 恢复提交按钮
            submitBtn.disabled = false;
            submitBtn.textContent = '重置密码';
        })
        .catch(error => {
            console.error('重置密码错误:', error);
            showError('general', '网络错误，请稍后重试');
            
            // 恢复提交按钮
            submitBtn.disabled = false;
            submitBtn.textContent = '重置密码';
        });
    });
    
    // 切换到步骤2
    function goToStep2() {
        // 更新步骤指示器
        step1.classList.remove('active');
        step1.classList.add('completed');
        step2.classList.add('active');
        
        // 切换表单
        step1Container.style.display = 'none';
        step2Container.style.display = 'block';
    }
    
    // 切换到步骤3
    function goToStep3() {
        // 更新步骤指示器
        step2.classList.remove('active');
        step2.classList.add('completed');
        step3.classList.add('active');
        
        // 切换表单
        step2Container.style.display = 'none';
        step3Container.style.display = 'block';
    }
    
    // 按钮倒计时
    function startCountdown(button) {
        let countdown = 60;
        button.disabled = true;
        button.textContent = `${countdown}秒后重新获取`;
        
        const timer = setInterval(() => {
            countdown--;
            button.textContent = `${countdown}秒后重新获取`;
            
            if (countdown <= 0) {
                clearInterval(timer);
                button.disabled = false;
                button.textContent = '获取验证码';
            }
        }, 1000);
    }
    
    // 处理错误
    function handleErrors(errors) {
        for (const field in errors) {
            if (field === 'general') {
                showError('general', errors[field]);
            } else if (field === 'code') {
                const elementId = 'code-error';
                const inputElement = document.getElementById('verification-code');
                
                if (inputElement) {
                    inputElement.classList.add('is-invalid');
                }
                
                showError(elementId, errors[field][0] || errors[field]);
            } else {
                const elementId = `${field}-error`;
                const inputElement = document.getElementById(field);
                
                if (inputElement) {
                    inputElement.classList.add('is-invalid');
                }
                
                showError(elementId, errors[field][0] || errors[field]);
            }
        }
    }
    
    // 显示错误信息
    function showError(elementId, message) {
        if (elementId === 'general') {
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            setTimeout(() => {
                errorAlert.style.display = 'none';
            }, 5000);
        } else {
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
        }
    }
    
    // 显示成功信息
    function showSuccess(message) {
        successAlert.textContent = message;
        successAlert.style.display = 'block';
        setTimeout(() => {
            successAlert.style.display = 'none';
        }, 5000);
    }
    
    // 清除错误提示
    function clearErrors() {
        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';
        
        // 移除所有输入字段的错误状态
        document.querySelectorAll('.is-invalid').forEach(element => {
            element.classList.remove('is-invalid');
        });
        
        // 清空所有错误提示
        document.querySelectorAll('.invalid-feedback').forEach(element => {
            element.textContent = '';
            element.style.display = 'none';
        });
    }
    
    // 密码显示/隐藏切换
    document.querySelectorAll('.password-toggle').forEach(button => {
        button.addEventListener('click', function() {
            const passwordInput = this.parentElement.querySelector('input');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    });
});
</script>
