{% load static %}
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f8f9fa;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    .navbar-brand img {
        height: 40px;
    }
    .auth-container {
        flex: 1;
        display: flex;
        align-items: center;
        padding: 40px 0;
    }
    .auth-card {
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        background-color: white;
    }
    .auth-sidebar {
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .auth-sidebar h2 {
        font-weight: 700;
        margin-bottom: 20px;
    }
    .auth-sidebar p {
        margin-bottom: 30px;
        opacity: 0.9;
    }
    .auth-sidebar .features {
        margin-bottom: 30px;
    }
    .auth-sidebar .feature-item {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
    }
    .auth-sidebar .feature-icon {
        background-color: rgba(255,255,255,0.2);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 15px;
    }
    .auth-sidebar img {
        border-radius: 8px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        max-height: 200px;
        object-fit: cover;
        margin-top: 10px;
    }
    .auth-content {
        padding: 40px;
    }
    .nav-tabs {
        border-bottom: none;
        margin-bottom: 30px;
    }
    .nav-tabs .nav-link {
        border: none;
        font-weight: 600;
        padding: 10px 20px;
        color: #6c757d;
    }
    .nav-tabs .nav-link.active {
        color: #6a11cb;
        border-bottom: 2px solid #6a11cb;
    }
    .form-control {
        padding: 12px 15px;
        border-radius: 8px;
    }
    .form-label {
        font-weight: 500;
    }
    .btn-auth {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        border: none;
        padding: 12px 20px;
        font-weight: 600;
    }
    .social-login {
        margin-top: 30px;
    }
    .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border-radius: 8px;
        margin-bottom: 15px;
        text-decoration: none;
        color: white;
        font-weight: 500;
        transition: all 0.3s;
    }
    .social-btn:hover {
        opacity: 0.9;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }
    .social-btn i {
        margin-right: 10px;
        font-size: 1.2rem;
    }
    .social-btn.google {
        background-color: #dd4b39;
        padding: 15px 20px;
        font-size: 16px;
    }
    .divider {
        display: flex;
        align-items: center;
        margin: 30px 0;
        color: #6c757d;
    }
    .divider::before, .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #dee2e6;
    }
    .divider span {
        padding: 0 15px;
    }
    @media (max-width: 767.98px) {
        .sidebar-bg, .auth-sidebar {
            display: none;
        }
    }
</style>
