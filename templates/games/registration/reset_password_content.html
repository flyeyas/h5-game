{% load static %}
<style>
    /* 内联样式确保背景覆盖 */
    .sidebar-bg {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        border-radius: 10px 0 0 10px;
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
    }
    /* 覆盖.auth-card样式，移除max-width限制 */
    .auth-card {
        max-width: none !important;
    }
    .step-indicator {
        display: flex;
        justify-content: center;
        margin-bottom: 30px;
        position: relative;
    }
    .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        z-index: 1;
        flex: 1;
        max-width: 120px;
    }
    .step-number {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #e9ecef;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        margin-bottom: 8px;
        position: relative;
        z-index: 2;
    }
    .step.active .step-number {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        color: white;
    }
    .step.completed .step-number {
        background: #28a745;
        color: white;
    }
    .step-text {
        font-size: 14px;
        color: #6c757d;
        text-align: center;
    }
    .step.active .step-text {
        color: #6a11cb;
        font-weight: 600;
    }
    .step.completed .step-text {
        color: #28a745;
        font-weight: 600;
    }
    /* 修改步骤连接线的样式 */
    .step-indicator::before {
        content: "";
        position: absolute;
        top: 20px;
        height: 2px;
        background-color: #e9ecef;
        width: 70%;
        left: 15%;
        z-index: 0;
    }
    
    /* 已完成步骤之间的连接线 */
    .step.completed + .step.completed::before,
    .step.completed + .step.active::before {
        content: "";
        position: absolute;
        top: 20px;
        height: 2px;
        background-color: #28a745;
        width: calc(100% - 40px);
        left: calc(-50% + 20px);
        z-index: 0;
    }
    
    /* 普通步骤之间的连接线 */
    .step + .step::before {
        content: "";
        position: absolute;
        top: 20px;
        height: 2px;
        background-color: #e9ecef;
        width: calc(100% - 40px);
        left: calc(-50% + 20px);
        z-index: 0;
    }
    .password-strength {
        height: 5px;
        background-color: #e9ecef;
        border-radius: 3px;
        margin-top: 5px;
    }
    .password-strength-bar {
        height: 100%;
        border-radius: 3px;
        width: 0;
        transition: width 0.3s, background-color 0.3s;
    }
    .password-feedback {
        font-size: 12px;
        margin-top: 5px;
    }
    .back-to-login {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #6c757d;
        text-decoration: none;
    }
    .back-to-login:hover {
        color: #6a11cb;
    }
    .unsplash-img {
        width: 100%;
        border-radius: 8px;
        margin-top: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .alert {
        display: none;
    }
</style>

<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="auth-card">
                    <div class="row g-0" style="min-height: 600px;">
                        <!-- 左侧信息栏 -->
                        <div class="col-md-5 position-relative">
                            <div class="sidebar-bg"></div>
                            <div class="position-relative" style="z-index: 1; padding: 40px;">
                                {% include 'games/registration/auth_sidebar.html' %}
                                
                                <!-- 添加Unsplash图片 -->
                                <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80" 
                                     alt="游戏图片" class="unsplash-img">
                            </div>
                        </div>
                        
                        <!-- 右侧表单区域 -->
                        <div class="col-md-7 auth-content">
                            <h4 class="mb-4 text-center">重置密码</h4>
                            <p class="text-muted text-center mb-4">请为您的账户设置新密码，以便继续访问您的账户</p>
                            
                            <!-- 提示信息区域 -->
                            <div class="alert alert-danger mb-3" id="errorAlert"></div>
                            <div class="alert alert-success mb-3" id="successAlert"></div>
                            
                            <!-- 步骤指示器 -->
                            <div class="step-indicator">
                                <div class="step completed" id="step1">
                                    <div class="step-number"><i class="fas fa-check"></i></div>
                                    <div class="step-text">验证邮箱</div>
                                </div>
                                <div class="step active" id="step2">
                                    <div class="step-number">2</div>
                                    <div class="step-text">重置密码</div>
                                </div>
                                <div class="step" id="step3">
                                    <div class="step-number">3</div>
                                    <div class="step-text">完成</div>
                                </div>
                            </div>
                            
                            <!-- 密码重置表单 -->
                            <div id="step2Form-container">
                                <form id="reset-password-form">
                                    <input type="hidden" name="token" id="reset-token" value="{{ token }}">
                                    <input type="hidden" name="email" id="reset-email" value="{{ email }}">
                                    
                                    <div class="mb-3">
                                        <label for="new-password" class="form-label">新密码</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                            <input type="password" class="form-control" id="new-password" name="new_password" placeholder="请输入新密码" required>
                                            <button type="button" class="btn btn-outline-secondary password-toggle" tabindex="-1">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                        <div class="password-strength">
                                            <div class="password-strength-bar"></div>
                                        </div>
                                        <div class="password-feedback text-muted"></div>
                                        <div class="invalid-feedback" id="new-password-error"></div>
                                    </div>
                                    
                                    <div class="mb-4">
                                        <label for="confirm-password" class="form-label">确认密码</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                            <input type="password" class="form-control" id="confirm-password" name="confirm_password" placeholder="请再次输入新密码" required>
                                            <button type="button" class="btn btn-outline-secondary password-toggle" tabindex="-1">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                        <div class="form-text password-match-feedback"></div>
                                        <div class="invalid-feedback" id="confirm-password-error"></div>
                                    </div>
                                    
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary btn-auth" id="reset-btn">重置密码</button>
                                    </div>
                                </form>
                            </div>
                            
                            <!-- 步骤3：完成 -->
                            <div id="step3-container" style="display:none;">
                                <div class="text-center">
                                    <div class="success-icon mb-4">
                                        <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                                    </div>
                                    <h5 class="mb-3">您的密码已成功重置</h5>
                                    <p class="text-muted mb-4">您现在可以使用新密码登录您的账户。</p>
                                    <div class="d-grid gap-2">
                                        <a href="{% url 'games:login' %}" class="btn btn-primary btn-auth">
                                            登录您的账户
                                        </a>
                                    </div>
                                </div>
                            </div>
                            
                            <a href="{% url 'games:login' %}" class="back-to-login">
                                <i class="fas fa-arrow-left me-1"></i>返回登录页面
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 获取DOM元素
    const resetPasswordForm = document.getElementById('reset-password-form');
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const passwordStrengthBar = document.querySelector('.password-strength-bar');
    const passwordFeedback = document.querySelector('.password-feedback');
    const passwordMatchFeedback = document.querySelector('.password-match-feedback');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');
    
    // 步骤和容器
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const step2Container = document.getElementById('step2Form-container');
    const step3Container = document.getElementById('step3-container');
    
    // 密码强度检查
    newPasswordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;
        let feedback = '';
        
        if (password.length > 0) {
            // 长度检查
            if (password.length >= 8) {
                strength += 25;
            } else {
                feedback = '密码长度至少需要8个字符';
            }
            
            // 字符种类检查
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[a-z]/.test(password)) strength += 15;
            if (/[0-9]/.test(password)) strength += 15;
            if (/[^A-Za-z0-9]/.test(password)) strength += 20;
            
            // 纯数字检查
            if (/^\d+$/.test(password)) {
                strength = 10;
                feedback = '密码不能是纯数字';
            }
            
            // 更新强度条
            passwordStrengthBar.style.width = strength + '%';
            
            // 设置强度条颜色
            if (strength < 30) {
                passwordStrengthBar.style.backgroundColor = '#dc3545'; // 红色
                if (!feedback) feedback = '密码强度：弱';
            } else if (strength < 60) {
                passwordStrengthBar.style.backgroundColor = '#ffc107'; // 黄色
                if (!feedback) feedback = '密码强度：中';
            } else {
                passwordStrengthBar.style.backgroundColor = '#28a745'; // 绿色
                if (!feedback) feedback = '密码强度：强';
            }
        } else {
            passwordStrengthBar.style.width = '0';
            feedback = '';
        }
        
        passwordFeedback.textContent = feedback;
    });
    
    // 密码匹配检查
    confirmPasswordInput.addEventListener('input', function() {
        if (this.value && newPasswordInput.value) {
            if (this.value === newPasswordInput.value) {
                passwordMatchFeedback.textContent = '密码匹配';
                passwordMatchFeedback.className = 'form-text text-success password-match-feedback';
            } else {
                passwordMatchFeedback.textContent = '密码不匹配';
                passwordMatchFeedback.className = 'form-text text-danger password-match-feedback';
            }
        } else {
            passwordMatchFeedback.textContent = '';
        }
    });
    
    // 密码显示/隐藏切换
    document.querySelectorAll('.password-toggle').forEach(button => {
        button.addEventListener('click', function() {
            const passwordInput = this.parentElement.querySelector('input');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    });
    
    // 表单提交
    resetPasswordForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // 清除错误提示
        clearErrors();
        
        // 获取表单数据
        const token = document.getElementById('reset-token').value;
        const email = document.getElementById('reset-email').value;
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        
        // 基本验证
        if (!newPassword) {
            showError('new-password-error', '请输入新密码');
            newPasswordInput.classList.add('is-invalid');
            return;
        }
        
        if (newPassword.length < 8) {
            showError('new-password-error', '密码长度至少需要8个字符');
            newPasswordInput.classList.add('is-invalid');
            return;
        }
        
        if (/^\d+$/.test(newPassword)) {
            showError('new-password-error', '密码不能是纯数字');
            newPasswordInput.classList.add('is-invalid');
            return;
        }
        
        if (!confirmPassword) {
            showError('confirm-password-error', '请确认新密码');
            confirmPasswordInput.classList.add('is-invalid');
            return;
        }
        
        if (newPassword !== confirmPassword) {
            showError('confirm-password-error', '两次输入的密码不匹配');
            confirmPasswordInput.classList.add('is-invalid');
            return;
        }
        
        // 禁用提交按钮
        const resetBtn = document.getElementById('reset-btn');
        resetBtn.disabled = true;
        resetBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 处理中...';
        
        // 发送AJAX请求重置密码
        const formData = new FormData();
        formData.append('token', token);
        formData.append('email', email);
        formData.append('new_password', newPassword);
        formData.append('confirm_password', confirmPassword);
        
        fetch('{% url "games:ajax_reset_password" %}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': '{{ csrf_token }}'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // 切换到步骤3
                goToStep3();
            } else {
                if (data.errors) {
                    handleErrors(data.errors);
                } else {
                    showError('general', '重置密码失败，请稍后重试');
                }
            }
            
            // 恢复提交按钮
            resetBtn.disabled = false;
            resetBtn.textContent = '重置密码';
        })
        .catch(error => {
            console.error('重置密码错误:', error);
            showError('general', '网络错误，请稍后重试');
            
            // 恢复提交按钮
            resetBtn.disabled = false;
            resetBtn.textContent = '重置密码';
        });
    });
    
    // 切换到步骤3
    function goToStep3() {
        // 更新步骤指示器
        step2.classList.remove('active');
        step2.classList.add('completed');
        step3.classList.add('active');
        
        // 切换表单
        step2Container.style.display = 'none';
        step3Container.style.display = 'block';
    }
    
    // 处理错误
    function handleErrors(errors) {
        for (const field in errors) {
            if (field === 'general') {
                showError('general', errors[field]);
            } else {
                const elementId = `${field.replace(/-/g, '-')}-error`;
                const inputElement = document.getElementById(field.replace(/-/g, '-'));
                
                if (inputElement) {
                    inputElement.classList.add('is-invalid');
                }
                
                showError(elementId, errors[field][0] || errors[field]);
            }
        }
    }
    
    // 显示错误信息
    function showError(elementId, message) {
        if (elementId === 'general') {
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            setTimeout(() => {
                errorAlert.style.display = 'none';
            }, 5000);
        } else {
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = message;
            }
        }
    }
    
    // 显示成功信息
    function showSuccess(message) {
        successAlert.textContent = message;
        successAlert.style.display = 'block';
        setTimeout(() => {
            successAlert.style.display = 'none';
        }, 5000);
    }
    
    // 清除错误提示
    function clearErrors() {
        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';
        
        // 移除所有输入字段的错误状态
        document.querySelectorAll('.is-invalid').forEach(element => {
            element.classList.remove('is-invalid');
        });
        
        // 清空所有错误提示
        document.querySelectorAll('.invalid-feedback').forEach(element => {
            element.textContent = '';
        });
    }
});
</script>
