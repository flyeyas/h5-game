<div class="filter-group">
    <h6>排序方式</h6>
    <div class="form-check">
        <input class="form-check-input filter-option" type="radio" name="sort" id="sortPopular" value="popular" {% if current_sort == 'popular' or not current_sort %}checked{% endif %}>
        <label class="form-check-label" for="sortPopular">最热门</label>
    </div>
    <div class="form-check">
        <input class="form-check-input filter-option" type="radio" name="sort" id="sortRating" value="rating" {% if current_sort == 'rating' %}checked{% endif %}>
        <label class="form-check-label" for="sortRating">评分最高</label>
    </div>
    <div class="form-check">
        <input class="form-check-input filter-option" type="radio" name="sort" id="sortNewest" value="newest" {% if current_sort == 'newest' %}checked{% endif %}>
        <label class="form-check-label" for="sortNewest">最新上线</label>
    </div>
</div>

<div class="filter-group">
    <h6>游戏分类</h6>
    <!-- 前5个分类 -->
    {% for category in categories|slice:":5" %}
    <div class="form-check">
        <input class="form-check-input" type="checkbox" id="category{{ category.id }}" name="category" value="{{ category.id }}"
            {% if category.id|stringformat:"i" in selected_categories %}checked{% endif %}>
        <label class="form-check-label" for="category{{ category.id }}">
            {{ category.name }} {% if category.games_count %}({{ category.games_count }}){% endif %}
        </label>
    </div>
    {% endfor %}
    
    <!-- 折叠的更多分类 -->
    {% if categories|length > 5 %}
    <div class="collapse" id="moreCategoriesCollapse">
        {% for category in categories|slice:"5:" %}
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="category{{ category.id }}" name="category" value="{{ category.id }}"
                {% if category.id|stringformat:"i" in selected_categories %}checked{% endif %}>
            <label class="form-check-label" for="category{{ category.id }}">
                {{ category.name }} {% if category.games_count %}({{ category.games_count }}){% endif %}
            </label>
        </div>
        {% endfor %}
    </div>
    
    <!-- 展开/折叠按钮 -->
    <a class="mt-2 d-block small text-secondary" style="color: #6c757d !important;" data-bs-toggle="collapse" href="#moreCategoriesCollapse" role="button" aria-expanded="false" aria-controls="moreCategoriesCollapse">
        <span class="more-text">显示更多</span>
        <span class="less-text d-none">收起</span>
        <i class="fas fa-chevron-down more-icon"></i>
        <i class="fas fa-chevron-up less-icon d-none"></i>
    </a>
    {% endif %}
</div>
