{% load static %}
<!-- 游戏详情页会员广告条 -->
<div class="premium-banner-wrapper" style="width: 100%; max-width: 1320px; margin: 0 auto 20px auto;">
    <div class="premium-banner" style="background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; position: relative;">
        <!-- 左侧装饰图案 - 在小屏幕上隐藏 -->
        <div class="banner-decoration d-none d-md-block" style="position: absolute; left: 0; top: 0; height: 100%; width: 120px; opacity: 0.1;">
            <svg width="120" height="100%" viewBox="0 0 120 300" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0,0 L120,0 L60,300 L0,300 Z" fill="#FFFFFF"/>
                <path d="M40,0 L120,0 L80,300 L20,300 Z" fill="#FFFFFF"/>
            </svg>
        </div>
        
        <!-- 右侧装饰图案 - 在小屏幕上隐藏 -->
        <div class="banner-decoration d-none d-md-block" style="position: absolute; right: 0; top: 0; height: 100%; width: 80px; opacity: 0.1;">
            <svg width="80" height="100%" viewBox="0 0 80 300" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="40" cy="50" r="60" fill="#FFFFFF"/>
                <circle cx="40" cy="150" r="40" fill="#FFFFFF"/>
                <circle cx="40" cy="250" r="30" fill="#FFFFFF"/>
            </svg>
        </div>
        
        <!-- 内容区域 -->
        <div class="content-wrapper" style="padding: 20px; position: relative; z-index: 10;">
            <div class="row align-items-center">
                <div class="col-md-7">
                    <div class="banner-text" style="color: white;">
                        <h4 style="margin-bottom: 5px; font-weight: 600;" class="mb-1">升级为会员，体验《{{ game.title }}》特权!</h4>
                        <p style="margin-bottom: 0; opacity: 0.9; font-size: 0.95rem;" class="d-none d-md-block">
                            <i class="fas fa-check-circle me-1"></i> 无广告干扰
                            <i class="fas fa-check-circle ms-3 me-1"></i> 游戏进度云存档
                            <i class="fas fa-check-circle ms-3 me-1"></i> 解锁游戏隐藏内容
                        </p>
                        <!-- 移动设备上显示的简化版本 -->
                        <p style="margin-bottom: 0; opacity: 0.9; font-size: 0.9rem;" class="d-md-none">
                            <i class="fas fa-check-circle me-1"></i> 解锁《{{ game.title }}》所有特权
                        </p>
                    </div>
                </div>
                <div class="col-md-5 text-md-end text-center mt-3 mt-md-0">
                    <a href="{% url 'games:subscription_plans' %}" class="btn btn-light px-4 py-2" style="font-weight: 600; border-radius: 50px; transition: all 0.3s ease;">
                        <i class="fas fa-crown me-2" style="color: #FFC107;"></i>立即升级会员
                    </a>
                    <span class="d-block mt-2 d-none d-md-block" style="color: rgba(255,255,255,0.7); font-size: 0.85rem;">提升您的游戏体验</span>
                </div>
            </div>
        </div>
    </div>
</div>
