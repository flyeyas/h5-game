{% extends "games/base.html" %}
{% load i18n %}

{% block title %}{% trans '支付取消' %} | GameHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body text-center p-5">
            <div class="mb-4">
                <i class="fas fa-times-circle text-danger" style="font-size: 80px;"></i>
            </div>
            <h1 class="display-4 mb-4">{% trans '支付已取消' %}</h1>
            <p class="lead">{% trans '您的支付已取消，没有产生任何费用。' %}</p>
            <p class="text-muted">{% trans '如果您遇到问题或有任何疑问，请联系我们的客户支持。' %}</p>
            
            <div class="mt-5">
                <a href="{% url 'games:subscription_plans' %}" class="btn btn-primary btn-lg">
                    <i class="fas fa-redo me-2"></i>{% trans '重新选择会员' %}
                </a>
                <a href="{% url 'games:index' %}" class="btn btn-outline-primary btn-lg ms-3">
                    <i class="fas fa-home me-2"></i>{% trans '返回首页' %}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
